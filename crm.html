    // ── END EMAIL DRAFTS ─────────────────────────────────────────────────────

    let rows = [];

    function parseCsv(text) {
      const records = [];
      let row = [], value = '', quoted = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];
        if (char === '"' && quoted && next === '"') { value += '"'; i++; }
        else if (char === '"') { quoted = !quoted; }
        else if (char === ',' && !quoted) { row.push(value); value = ''; }
        else if ((char === '\n' || char === '\r') && !quoted) {
          if (char === '\r' && next === '\n') i++;
          row.push(value);
          if (row.some(cell => cell.trim())) records.push(row);
          row = []; value = '';
        } else { value += char; }
      }
      if (value || row.length) { row.push(value); records.push(row); }
      const headers = records.shift();
      return records.map(record => Object.fromEntries(headers.map((key, index) => [key, record[index] || ''])));
    }

    function priorityFor(row) { return priorities.get(row.Industry) || 'cool'; }

    function filteredRows() {
      const q = document.querySelector('#search').value.trim().toLowerCase();
      const industry = document.querySelector('#industry').value;
      const city = document.querySelector('#city').value;
      return rows.filter(row => {
        const haystack = Object.values(row).join(' ').toLowerCase();
        return (!q || haystack.includes(q)) &&
          (!industry || row.Industry === industry) &&
          (!city || row.City === city);
      });
    }

    function renderStats(data) {
      const phones = data.filter(row => row.Phone).length;
      const emails = data.filter(row => row.Email).length;
      const hot = data.filter(row => priorityFor(row) === 'hot').length;
      document.querySelector('#stats').innerHTML = [
        ['Total leads', data.length],
        ['Hot priority', hot],
        ['With phone', phones],
        ['With email', emails]
      ].map(([label, value]) => `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join('');
    }

    function card(row) {
      const priority = priorityFor(row);
      const name = row['Business Name'];
      const mail = row.Email ? `<a href="mailto:${row.Email}">${row.Email}</a>` : '';
      const phone = row.Phone ? `<a href="tel:${row.Phone}">${row.Phone}</a>` : '';
      const hasDraft = EMAIL_DRAFTS[name];
      const safeName = name.replace(/'/g, "\\'");
      const draftBtn = hasDraft
        ? `<button class="btn-draft" onclick="showDraft('${safeName}')">✉ Draft Email</button>`
        : '';
      return `
        <article class="card">
          <h3>${name}</h3>
          <div class="chips">
            <span class="chip ${priority}">${priority.toUpperCase()}</span>
            <span class="chip">${row.Industry}</span>
          </div>
          <div class="meta">${row.City}, ${row.State}</div>
          <div class="notes"><strong>Opportunity:</strong> ${row['AI Opportunity']}</div>
          <div class="notes">${row.Notes}</div>
          <div class="actions">
            <a href="${row.Website}" target="_blank" rel="noreferrer">Website</a>
            ${phone}
            ${mail}
            ${draftBtn}
          </div>
        </article>
      `;
    }

    function renderBoard() {
      const data = filteredRows();
      renderStats(data);
      const groups = [['hot','Hot'],['warm','Warm'],['cool','Research']];
      document.querySelector('#board').innerHTML = groups.map(([key, label]) => {
        const groupRows = data.filter(row => priorityFor(row) === key);
        return `
          <section class="lane">
            <h2><span>${label}</span><span>${groupRows.length}</span></h2>
            <div class="cards">${groupRows.length ? groupRows.map(card).join('') : '<div class="empty">No matching leads.</div>'}</div>
          </section>
        `;
      }).join('');
    }

    function fillSelect(id, values) {
      const select = document.querySelector(id);
      for (const value of [...new Set(values)].sort()) {
        const option = document.createElement('option');
        option.value = value; option.textContent = value;
        select.append(option);
      }
    }

    function exportCsv() {
      const link = document.createElement('a');
      link.href = csvUrl; link.download = 'ai-leads-west-palm-beach.csv'; link.click();
    }

    // ── EMAIL MODAL ──────────────────────────────────────────────────────────
    function showDraft(bizName) {
      const d = EMAIL_DRAFTS[bizName];
      if (!d) return;
      document.getElementById('em-biz').textContent = bizName;
      document.getElementById('em-to').value = d.to || '';
      document.getElementById('em-subject').value = d.subject || '';
      document.getElementById('em-body').value = d.body || '';
      document.getElementById('copy-confirm').style.display = 'none';
      document.getElementById('email-overlay').classList.add('open');
    }

    function closeEmail() {
      document.getElementById('email-overlay').classList.remove('open');
    }

    function openInMail() {
      const to = document.getElementById('em-to').value.trim();
      const subject = encodeURIComponent(document.getElementById('em-subject').value);
      const body = encodeURIComponent(document.getElementById('em-body').value);
      window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
    }

    function copyBody() {
      const body = document.getElementById('em-body').value;
      navigator.clipboard.writeText(body).then(() => {
        const el = document.getElementById('copy-confirm');
        el.style.display = 'inline';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
      });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEmail(); });
    // ── END EMAIL MODAL ──────────────────────────────────────────────────────

    // Load inline — no fetch needed, works from file:// and any server
    rows = parseCsv(INLINE_CSV);
    fillSelect('#industry', rows.map(row => row.Industry));
    fillSelect('#city', rows.map(row => row.City));
    document.querySelector('#search').addEventListener('input', renderBoard);
    document.querySelector('#industry').addEventListener('change', renderBoard);
    document.querySelector('#city').addEventListener('change', renderBoard);
    document.querySelector('#export').addEventListener('click', exportCsv);
    renderBoard();
  </script>
